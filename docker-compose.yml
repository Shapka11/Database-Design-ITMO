networks:
  patroni_net:
    driver: bridge

services:

  etcd1:
    image: quay.io/coreos/etcd:v3.6.12
    container_name: etcd1
    restart: always
    environment:
      ETCD_NAME: etcd1
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd1:2379
      ETCD_LISTEN_PEER_URLS: http://0.0.0.0:2380
      ETCD_INITIAL_ADVERTISE_PEER_URLS: http://etcd1:2380
      ETCD_INITIAL_CLUSTER: etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380
      ETCD_INITIAL_CLUSTER_TOKEN: etcd-cluster
      ETCD_INITIAL_CLUSTER_STATE: new
      ETCD_DATA_DIR: /etcd-data
    ports:
      - "2379:2379"
    volumes:
      - etcd1_data:/etcd-data
    networks:
      - patroni_net

  etcd2:
    image: quay.io/coreos/etcd:v3.6.12
    container_name: etcd2
    restart: always
    environment:
      ETCD_NAME: etcd2
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd2:2379
      ETCD_LISTEN_PEER_URLS: http://0.0.0.0:2380
      ETCD_INITIAL_ADVERTISE_PEER_URLS: http://etcd2:2380
      ETCD_INITIAL_CLUSTER: etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380
      ETCD_INITIAL_CLUSTER_TOKEN: etcd-cluster
      ETCD_INITIAL_CLUSTER_STATE: new
      ETCD_DATA_DIR: /etcd-data
    volumes:
      - etcd2_data:/etcd-data
    networks:
      - patroni_net

  etcd3:
    image: quay.io/coreos/etcd:v3.6.12
    container_name: etcd3
    restart: always
    environment:
      ETCD_NAME: etcd3
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd3:2379
      ETCD_LISTEN_PEER_URLS: http://0.0.0.0:2380
      ETCD_INITIAL_ADVERTISE_PEER_URLS: http://etcd3:2380
      ETCD_INITIAL_CLUSTER: etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380
      ETCD_INITIAL_CLUSTER_TOKEN: etcd-cluster
      ETCD_INITIAL_CLUSTER_STATE: new
      ETCD_DATA_DIR: /etcd-data
    volumes:
      - etcd3_data:/etcd-data
    networks:
      - patroni_net

  pg1:
    build: ./patroni
    container_name: pg1
    hostname: pg1
    restart: always
    env_file: .env
    environment:
      PATRONI_NAME: pg1
      PATRONI_RESTAPI_CONNECT_ADDRESS: pg1:8008
      PATRONI_POSTGRESQL_CONNECT_ADDRESS: pg1:5432
      PATRONI_SUPERUSER_PASSWORD: ${POSTGRES_PASSWORD}
      PATRONI_REPLICATION_PASSWORD: ${REPLICATION_PASSWORD}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REPLICATION_PASSWORD: ${REPLICATION_PASSWORD}
    volumes:
      - pg1_data:/var/lib/postgresql/data_dir
    depends_on:
      - etcd1
      - etcd2
      - etcd3
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8008/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - patroni_net

  pg2:
    build: ./patroni
    container_name: pg2
    hostname: pg2
    restart: always
    env_file: .env
    environment:
      PATRONI_NAME: pg2
      PATRONI_RESTAPI_CONNECT_ADDRESS: pg2:8008
      PATRONI_POSTGRESQL_CONNECT_ADDRESS: pg2:5432
      PATRONI_SUPERUSER_PASSWORD: ${POSTGRES_PASSWORD}
      PATRONI_REPLICATION_PASSWORD: ${REPLICATION_PASSWORD}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REPLICATION_PASSWORD: ${REPLICATION_PASSWORD}
    volumes:
      - pg2_data:/var/lib/postgresql/data_dir
    depends_on:
      - etcd1
      - etcd2
      - etcd3
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8008/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - patroni_net

  haproxy:
    image: haproxy:latest
    container_name: haproxy
    restart: always
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "${POSTGRES_PORT}:5432"
      - "8404:8404"
    depends_on:
      - pg1
      - pg2
    networks:
      - patroni_net

  migrations:
    build: .
    container_name: migrations
    env_file: .env
    environment:
      - PGPASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - ./migrations:/liquibase/changelog
      - ./postgres-init:/liquibase/postgres-init:ro
      - ./scripts:/scripts
    depends_on:
      - haproxy
    networks:
      - patroni_net

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${EXPORTER_USER}:${EXPORTER_PASSWORD}@haproxy:5432/${POSTGRES_DB}?sslmode=disable"
    depends_on:
      migrations:
        condition: service_completed_successfully
    networks:
      - patroni_net

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command: [ "--config.file=/etc/prometheus/prometheus.yml" ]
    depends_on:
      - postgres-exporter
    networks:
      - patroni_net

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - patroni_net

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    env_file: .env
    command: server /data --console-address ":9001"
    environment:
      MINIO_PROMETHEUS_AUTH_TYPE: public
    volumes:
      - minio_data:/data
    networks:
      - patroni_net

  backup:
    build: ./backup
    container_name: backup
    env_file: .env
    depends_on:
      - haproxy
      - minio
    networks:
      - patroni_net

  kafka:
    image: confluentinc/cp-kafka:8.1.3
    container_name: kafka
    restart: always
    ports:
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:29092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      CLUSTER_ID: '4L62IdFFQ6eR3Z525GFFnw'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    networks:
      - patroni_net

  connect:
    image: debezium/connect:2.7.3.Final
    container_name: connect
    restart: always
    ports:
      - "8083:8083"
    depends_on:
      - kafka
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: my_connect_configs
      OFFSET_STORAGE_TOPIC: my_connect_offsets
      STATUS_STORAGE_TOPIC: my_connect_statuses
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
    networks:
      - patroni_net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    restart: always
    ports:
      - "8085:8080"
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: wizard-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - patroni_net

  clickhouse:
    image: clickhouse/clickhouse-server:26.3
    container_name: clickhouse
    restart: always
    ports:
      - "8123:8123"
      - "9009:9000"
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse_password
    volumes:
      - ./clickhouse/custom-limits.xml:/etc/clickhouse-server/config.d/custom-limits.xml:ro
      - clickhouse_data:/var/lib/clickhouse
    networks:
      - patroni_net

  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    restart: always
    ports:
      - "3001:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase_metadata
      MB_DB_PORT: 5432
      MB_DB_USER: metabase_user
      MB_DB_PASS: metabase_password_secure
      MB_DB_HOST: haproxy
    depends_on:
      migrations:
        condition: service_completed_successfully
    networks:
      - patroni_net

volumes:
  pg1_data:
  pg2_data:
  grafana_data:
  minio_data:
  prometheus_data:
  etcd1_data:
  etcd2_data:
  etcd3_data:
  clickhouse_data:
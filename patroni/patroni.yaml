scope: postgres-cluster
namespace: /service/
name: ${PATRONI_NAME}

restapi:
  listen: 0.0.0.0:8008
  connect_address: ${PATRONI_RESTAPI_CONNECT_ADDRESS}

etcd3:
  hosts:
    - etcd1:2379
    - etcd2:2379
    - etcd3:2379

bootstrap:
  dcs:
    ttl: 30
    loop_wait: 10
    retry_timeout: 10
    maximum_lag_on_failover: 1048576

    postgresql:
      use_pg_rewind: true
      parameters:
        wal_level: logical
        hot_standby: "on"
        max_wal_senders: 10
        max_replication_slots: 10

  initdb:
    - encoding: UTF8
    - data-checksums

postgresql:
  listen: 0.0.0.0:5432
  connect_address: ${PATRONI_POSTGRESQL_CONNECT_ADDRESS}
  data_dir: /var/lib/postgresql/data_dir
  bin_dir: /usr/lib/postgresql/18/bin
  remove_data_directory_on_rewind_failure: false
  remove_data_directory_on_diverged_timelines: false

  authentication:
    replication:
      username: replication
      password: ${PATRONI_REPLICATION_PASSWORD}
    superuser:
      username: postgres
      password: ${PATRONI_SUPERUSER_PASSWORD}
  pg_hba:
    - host replication replication 0.0.0.0/0 md5
    - host replication dbz_user 0.0.0.0/0 md5
    - host all dbz_user 0.0.0.0/0 md5
    - host all all 0.0.0.0/0 md5